name: Deploy Ubuntu Docker

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    env:
      DEPLOY_DIR: /opt/deploy/ores

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync project files to deploy folder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_DIR"

          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            "$GITHUB_WORKSPACE/" "$DEPLOY_DIR/"

      - name: Rebuild and restart containers
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          docker compose up -d --build --remove-orphans
