services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: glpi_app
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: "2801"
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://mongo:27017/glpi_dev?replicaSet=rs0}
      MONGO_DB: ${MONGO_DB:-glpi_dev}
      SESSION_SECRET: ${SESSION_SECRET:-asdkj1o3u091dkalsdn1092sd11asdfkad}
      MONGO_MAX_POOL_SIZE: "80"
      MONGO_MIN_POOL_SIZE: "10"
      USER_ACTIVE_CACHE_TTL_MS: "15000"
      SESSION_ROLLING: "false"
      SESSION_TOUCH_AFTER_SECONDS: "300"
    ports:
      - "2801:2801"
    restart: unless-stopped
    networks:
      suite: {}
      glpi-private:
        aliases:
          - app

  nginx:
    image: nginx:1.27-alpine
    container_name: glpi_nginx
    depends_on:
      - app
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      suite: {}
      glpi-private:
        aliases:
          - nginx

  glpi-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: glpi_tunnel
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - glpi-private

networks:
  suite:
    name: alento_suite
    external: true
  glpi-private:
