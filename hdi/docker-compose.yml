services:
  hdi:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_TOKEN: ${NPM_TOKEN}
    container_name: hdi
    env_file:
      - .env
    volumes:
      - ./src/uploads:/app/src/uploads/
    environment:
      - TZ=America/Sao_Paulo
      - HOST=0.0.0.0
      - DB_URI=${DB_URI_DOCKER:-mongodb://mongo:27017/HDI?replicaSet=rs0}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - suite
      - hdi-private

  nginx:
    image: nginx:1.27-alpine
    container_name: hdi_nginx
    depends_on:
      - hdi
    ports:
      - "8082:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      suite:
        aliases:
          - hdi-origin
      hdi-private:
        aliases:
          - nginx

  hdi-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: hdi_tunnel
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - hdi-private

networks:
  suite:
    name: alento_suite
    external: true
  hdi-private:
