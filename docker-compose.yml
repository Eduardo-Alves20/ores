services:
  alento-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alento-app
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://mongo:27017/ALENTO?replicaSet=rs0}
    restart: unless-stopped
    networks:
      - suite

  nginx:
    image: nginx:1.27-alpine
    container_name: alento-nginx
    depends_on:
      - alento-app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - suite

  alento-tunnel:
    image: cloudflare/cloudflared:latest
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - suite

networks:
  suite:
    name: glpi_suite
    external: true
