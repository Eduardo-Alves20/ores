version: "3.0"

services:
  ores:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./uploads:/app/uploads/
    environment:
      - TZ=America/Sao_Paulo
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
