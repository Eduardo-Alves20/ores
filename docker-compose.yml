services:
  mongo:
    image: mongo:7.0
    container_name: alento-mongo
    volumes:
      - alento-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "mongodb://127.0.0.1:27017/admin", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  alento-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alento-app
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://host.docker.internal:27017/ALENTO?directConnection=true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: alento-nginx
    depends_on:
      - alento-app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  alento-tunnel:
    profiles:
      - public
    image: cloudflare/cloudflared:latest
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped

volumes:
  alento-mongo-data:
